apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-client
spec:
  replicas: 5
  selector:
    matchLabels:
      app: fl-client
  template:
    metadata:
      labels:
        app: fl-client
    spec:
      containers:
        - name: fl-client
          image: docker.io/library/fl-client:v1.5
          imagePullPolicy: Never